services:
  go-control-plane:
    build:
      context: ./go-control-plane
    ports:
      - "8080:8080"

  cpp-gateway:
    build:
      context: ./cpp-gateway
    environment:
      GATEWAY_PORT: "9000"
      CONTROL_PLANE_HOST: go-control-plane
      CONTROL_PLANE_PORT: "8080"
    ports:
      - "9000:9000"
    depends_on:
      - go-control-plane
