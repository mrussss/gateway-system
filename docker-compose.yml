services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  go-control-plane:
    build:
      context: ./go-control-plane
    environment:
      STORE_BACKEND: redis
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - redis

  cpp-gateway:
    build:
      context: ./cpp-gateway
    environment:
      GATEWAY_PORT: "9000"
      CONTROL_PLANE_HOST: go-control-plane
      CONTROL_PLANE_PORT: "8080"
    ports:
      - "9000:9000"
    depends_on:
      - go-control-plane
